name: Integration (RLS / DB)

on:
  pull_request:
    paths:
      - "supabase/**"
      - "lib/supabase/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "lib/supabase/**"
      - "tests/integration/**"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls:
    name: RLS isolation suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      APP_BASE_URL: http://localhost:3000
      BOLNA_WEBHOOK_SOURCE_IPS: 13.203.39.153
      LOG_LEVEL: warn
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Generate KMS_KEY_B64
        run: echo "KMS_KEY_B64=$(node -e "console.log(require('crypto').randomBytes(32).toString('base64'))")" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: supabase start

      - name: Export local Supabase keys
        run: |
          status=$(supabase status -o env)
          echo "$status" | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY|API_URL)=' | sed -E \
            -e 's/^ANON_KEY=/NEXT_PUBLIC_SUPABASE_ANON_KEY=/' \
            -e 's/^SERVICE_ROLE_KEY=/SUPABASE_SERVICE_ROLE_KEY=/' \
            -e 's/^API_URL=/NEXT_PUBLIC_SUPABASE_URL=/' \
            >> "$GITHUB_ENV"

      - name: Reset DB (apply migrations)
        run: supabase db reset --no-seed

      - name: Run integration tests
        run: pnpm test:integration

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
