name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck / lint / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      APP_BASE_URL: http://localhost:3000
      BOLNA_API_BASE_URL: https://api.bolna.ai
      BOLNA_WEBHOOK_SOURCE_IPS: 13.203.39.153
      LOG_LEVEL: warn
      NODE_ENV: test
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Generate KMS_KEY_B64
        run: echo "KMS_KEY_B64=$(node -e "console.log(require('crypto').randomBytes(32).toString('base64'))")" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
